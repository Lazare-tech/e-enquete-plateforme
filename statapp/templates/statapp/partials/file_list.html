{% for file in files %}
<div class="col-md-6 col-lg-4">
    <div class="card h-100 border-0 shadow-sm hover-lift transition">
        <div class="card-body p-4 text-center">
            <div class="mb-3 text-success">
                {% if file.get_extension == 'csv' %}
                    <i class="fas fa-file-csv fa-3x text-info"></i>
                {% else %}
                    <i class="fas fa-file-excel fa-3x"></i>
                {% endif %}
            </div>
            <span class="badge bg-light text-primary border border-primary mb-2">
                {{ file.category.title }}
            </span>
            <h5 class="fw-bold mb-2">{{ file.title }}</h5>
            <p class="text-muted small mb-4 text-truncate-3">
                {{ file.description|default:"Aucune description disponible." }}
            </p>
            <a href="{% url 'statapp:detail' file.slug %}" class="btn btn-primary w-100 rounded-pill shadow-sm">
                Consulter les détails
            </a>
        </div>
    </div>
</div>
{% empty %}
<div class="col-12 text-center py-5">
    <i class="fas fa-search fa-3x text-muted mb-3"></i>
    <p class="text-muted">Aucun résultat trouvé pour "<strong>{{ request.GET.q }}</strong>".</p>
</div>
{% endfor %}
