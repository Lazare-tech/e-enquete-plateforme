{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Réinitialisation</h2>
                    <p class="text-muted small">Entrez votre email pour recevoir un lien de récupération.</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Adresse Email</label>
                        <input type="email" name="email" class="form-control" required placeholder="nom@exemple.com">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill">Envoyer le lien</button>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{% url 'statapp:login' %}" class="small text-muted text-decoration-none">
                        <i class="fas fa-arrow-left me-1"></i> Retour à la connexion
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
