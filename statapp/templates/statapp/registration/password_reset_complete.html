{% extends 'base.html' %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm p-5 rounded-4 border-top border-success border-5">
                <i class="fas fa-check-circle text-success display-4 mb-4"></i>
                <h2 class="fw-bold">Mot de passe modifié !</h2>
                <p class="text-muted">
                    Votre mot de passe a été mis à jour avec succès. Vous pouvez maintenant vous connecter à votre espace Data.
                </p>
                <div class="mt-4">
                    <a href="{% url 'statapp:login' %}" class="btn btn-primary rounded-pill px-5 py-2 fw-bold">
                        Se connecter
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
