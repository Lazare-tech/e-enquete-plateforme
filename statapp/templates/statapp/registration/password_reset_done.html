{% extends 'base.html' %}

{% block content %}
<div class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm p-5 rounded-4">
                <i class="fas fa-paper-plane text-primary display-4 mb-4"></i>
                <h2 class="fw-bold">Email envoyé !</h2>
                <p class="text-muted">
                    Si un compte existe avec cet email, vous recevrez bientôt un lien pour créer un nouveau mot de passe.
                </p>
                <div class="alert alert-info small mt-3">
                    <i class="fas fa-info-circle me-1"></i> Pensez à vérifier vos courriers indésirables (spams).
                </div>
                <a href="{% url 'statapp:login' %}" class="btn btn-outline-primary-bl rounded-pill px-4 mt-3">
                    Retour à la connexion
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
