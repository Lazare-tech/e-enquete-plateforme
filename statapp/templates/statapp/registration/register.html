{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Créer un compte</h2>
                    <p class="text-muted small">Rejoignez la plateforme statistique</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger x-small">{{ field.errors|striptags }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary-bl text-white w-100 py-2 rounded-pill mt-3 shadow-sm">
                        S'inscrire gratuitement
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
