{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-white border-0 pt-4 px-4 text-center">
                    <h3 class="fw-bold text-primary mb-0">Ajouter des données</h3>
                    <p class="text-muted small">Portail collaboratif d'agence</p>
                </div>
                
                <div class="card-body p-4">
                    <ul class="nav nav-pills nav-fill mb-4 bg-light p-1 rounded-pill" id="dataTabs" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active rounded-pill text-decoration-none" data-bs-toggle="tab" data-bs-target="#fileFormTab">
                                <i class="fas fa-file-export me-2"></i>Fichier d'enquête
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link rounded-pill text-decoration-none" data-bs-toggle="tab" data-bs-target="#varFormTab">
                                <i class="fas fa-plus-square me-2"></i>Variable simple
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="fileFormTab">
                            <form method="post" enctype="multipart/form-data">
                                {% csrf_token %}
                                
                                <div class="mb-4 p-3 bg-light rounded-3 border-start border-primary border-4">
                                    <label class="form-label fw-bold text-primary small uppercase">Optionnel : Créer une catégorie</label>
                                    <input type="text" name="new_file_category_title" class="form-control mb-1"
                                           placeholder="Taper ici si la catégorie n'existe pas..."
                                           hx-get="{% url 'statapp:check_category' %}" 
                                           hx-trigger="keyup changed delay:500ms" 
                                           hx-target="#file-category-status"
                                           hx-vals='{"type": "file"}'>
                                    <div id="file-category-status"></div>
                                </div>

                                {{ file_form.as_p }}
                                <button type="submit" name="submit_file" id="btn-submit-file" class="btn btn-primary w-100 py-3 mt-2">
                                    <i class="fas fa-cloud-upload-alt me-2"></i>Enregistrer le fichier
                                </button>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="varFormTab">
                            <form method="post">
                                {% csrf_token %}

                                <div class="mb-4 p-3 bg-light rounded-3 border-start border-success border-4">
                                    <label class="form-label fw-bold text-success small uppercase">Optionnel : Créer une catégorie</label>
                                    <input type="text" name="new_category_title" class="form-control mb-1"
                                           placeholder="Taper ici si la catégorie n'existe pas..."
                                           hx-get="{% url 'statapp:check_category' %}" 
                                           hx-trigger="keyup changed delay:500ms" 
                                           hx-target="#var-category-status"
                                           hx-vals='{"type": "variable"}'>
                                    <div id="var-category-status"></div>
                                </div>

                                {{ var_form.as_p }}
                                <button type="submit" name="submit_var" id="btn-submit-var" class="btn btn-success w-100 py-3 mt-2">
                                    <i class="fas fa-check-circle me-2"></i>Enregistrer la variable
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
