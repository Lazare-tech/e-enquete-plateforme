{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-header bg-white border-0 pt-4 px-4">
                    <h3 class="fw-bold text-primary mb-0">Ajouter des données</h3>
                    <p class="text-muted">Choisissez le type de contenu à publier sur le portail.</p>
                </div>
                
                <div class="card-body p-4">
                    <ul class="nav nav-pills nav-fill mb-4 bg-light p-1 rounded-pill" id="dataTabs" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active rounded-pill" id="file-tab" data-bs-toggle="tab" data-bs-target="#fileForm">
                                <i class="fas fa-file-export me-2"></i>Fichier d'enquête
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link rounded-pill" id="var-tab" data-bs-toggle="tab" data-bs-target="#varForm">
                                <i class="fas fa-plus-square me-2"></i>Variable simple
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content" id="dataTabsContent">
                        <div class="tab-pane fade show active" id="fileForm">
                            <form method="post" enctype="multipart/form-data">
                                {% csrf_token %}
                                {{ file_form.as_p }}
                                <button type="submit" name="submit_file" class="btn btn-primary w-100 py-3 mt-3">
                                    <i class="fas fa-cloud-upload-alt me-2"></i>Publier le fichier
                                </button>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="varForm">
                            <form method="post">
                                {% csrf_token %}
                                {{ var_form.as_p }}
                                <button type="submit" name="submit_var" class="btn btn-success w-100 py-3 mt-3">
                                    <i class="fas fa-check-circle me-2"></i>Enregistrer la variable
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
