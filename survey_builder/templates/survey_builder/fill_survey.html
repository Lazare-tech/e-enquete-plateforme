{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 mb-4 rounded-3 overflow-hidden">
                <div class="card-header bg-primary py-3"></div>
                <div class="card-body p-4">
                    <h1 class="display-6 fw-bold text-dark">{{ survey.title }}</h1>
                    <p class="lead text-muted">{{ survey.description }}</p>
                </div>
            </div>

            <form method="post" enctype="multipart/form-data" class="needs-validation">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="card shadow-sm border-0 mb-3 question-card">
                    <div class="card-body p-4">
                        <label class="form-label fw-bold mb-3 d-block h5">
                            {{ field.label }}
                            {% if field.field.required %}<span class="text-danger">*</span>{% endif %}
                        </label>
                        
                        <div class="field-container">
                            {{ field }}
                        </div>

                        {% if field.errors %}
                        <div class="alert alert-danger mt-2 py-2">
                            {{ field.errors }}
                        </div>
                        {% endif %}
                    </div>
                </div>
                {% endfor %}

                <div class="d-grid gap-2 mt-5">
                    <button type="submit" class="btn btn-primary btn-lg py-3 shadow">
                        <i class="fas fa-check-circle me-2"></i> Soumettre le formulaire
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    body { background-color: #f8f9fa; }
    .question-card { border-left: 5px solid #0d6efd !important; transition: 0.3s; }
    .question-card:hover { transform: translateX(5px); }
    /* Style pour les listes de cases à cocher et radios */
    ul { list-style: none; padding-left: 0; }
    li { margin-bottom: 8px; }
    .form-check-input { margin-right: 10px; }
</style>
{% endblock content %}
