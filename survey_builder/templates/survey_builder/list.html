{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <h2 class="fw-bold mb-4">Formulaires disponibles</h2>
    <div class="list-group shadow-sm">
        {% for s in surveys %}
            <a href="{% url 'survey:fill' s.id %}" class="list-group-item list-group-item-action p-4 d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1 fw-bold">{{ s.title }}</h5>
                    <p class="mb-0 text-muted small">{{ s.description }}</p>
                </div>
                <i class="fas fa-chevron-right text-primary"></i>
            </a>
        {% empty %}
            <p class="text-center p-5 text-muted">Aucun formulaire actif pour le moment.</p>
        {% endfor %}
    </div>
</div>
{% endblock content %}
